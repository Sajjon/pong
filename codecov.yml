# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
#
# Policy: report project-wide coverage only.
# Patch coverage (per-PR diff) is disabled because the test suite covers
# core logic exhaustively and per-diff reporting adds noise without value.

codecov:
  branch: main
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        # Require coverage to stay at or above the current level
        # (auto) minus a 1 % grace margin.
        target: auto
        threshold: 1%
        informational: false   # Fail the status check if coverage drops
    patch:
      default:
        enabled: false         # Do not report patch coverage

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true        # Only comment when coverage actually changes

# Test code is excluded from coverage measurement — coverage of the tests
# themselves is meaningless (tests don't test their own assertions), and
# letting them count would artificially deflate or inflate the score.
ignore:
  - "PongTests/**"
